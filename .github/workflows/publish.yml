name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROTOCOL_VERSION=$(node -p "require('./packages/bridge-protocol/package.json').version")
          BRIDGE_VERSION=$(node -p "require('./packages/cli/package.json').version")

          if [ "$TAG" != "$PROTOCOL_VERSION" ] || [ "$TAG" != "$BRIDGE_VERSION" ]; then
            echo "Tag v${TAG} must match both package versions."
            echo "  @pondview/bridge-protocol: ${PROTOCOL_VERSION}"
            echo "  pondview: ${BRIDGE_VERSION}"
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck packages
        run: |
          bun run bridge-protocol:typecheck
          bun run bridge:typecheck

      - name: Test packages
        run: bun test packages/cli packages/bridge-protocol

      - name: Dry-run npm pack
        run: bun run cli:pack:dry-run

  publish:
    name: Publish to npm
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.0"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish @pondview/bridge-protocol
        run: |
          VERSION=$(node -p "require('./packages/bridge-protocol/package.json').version")
          if npm view "@pondview/bridge-protocol@${VERSION}" version > /dev/null 2>&1; then
            echo "@pondview/bridge-protocol@${VERSION} is already published; skipping."
          else
            npm publish --workspace @pondview/bridge-protocol --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pondview/cli
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          if npm view "@pondview/cli@${VERSION}" version > /dev/null 2>&1; then
            echo "@pondview/cli@${VERSION} is already published; skipping."
          else
            npm publish --workspace @pondview/cli --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
