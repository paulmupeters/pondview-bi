version: 1
explore: unicorns
base: unicorns
dimensions:
  - name: Country
    sql: unicorns.Country
    type: string
  - name: year
    sql: EXTRACT(YEAR FROM unicorns."Date Joined")
    type: number
  - name: Company
    sql: unicorns.Company
    type: string
  - name: Valuation_numeric
    sql: CAST([object Object]([object Object](unicorns.Valuation, $, ), B, ) AS undefined) * 1000
    type: string
  - name: Industry
    sql: unicorns.Industry
    type: string
  - name: Valuation
    sql: unicorns.Valuation
    type: string
  - name: as
    sql: '112'
    type: number
measures:
  - name: num_unicorns
    agg: count
    sql: '*'
  - name: unicorn_count
    agg: count
    sql: '*'
  - name: total_unicorns
    agg: count
    sql: '*'
  - name: count
    agg: count
    sql: '*'
