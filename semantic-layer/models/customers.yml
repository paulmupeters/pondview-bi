# models/customers.yaml
version: 1
explore: customers
base: customers
dimensions:
  - name: id
    sql: customers.id
    type: number
    primaryKey: true
    conformKey: customer_id
  - name: region
    sql: customers.region
    type: string
    conformKey: region
  - name: name
    sql: customers.name
    type: string
measures:
  - name: customer_count
    agg: count